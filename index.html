<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026дЄЦзХМжЭѓ ¬Ј зїњиМµжО®жЉФ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
  :root{
    --grass:#1f8a3b;        /* vivid pitch */
    --grass-d:#177030;      /* darker mow stripe */
    --grass-dd:#0f5824;     /* deepest shade */
    --line:#ffffff;         /* pitch line white */
    --line-soft:rgba(255,255,255,.55);
    --line-faint:rgba(255,255,255,.16);
    --ink:#ffffff;
    --cream:#f3f7ee;
    --muted:#cfe6d2;
    --muted2:#9ec7a4;
    --gold:#ffd24a;
    --gold-d:#e0a92a;
    --chalk:#eafff0;
    --panel:rgba(8,52,24,.55);
    --panel-solid:#0f5e29;
    --shadow:0 10px 30px rgba(0,0,0,.28);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:'Space Grotesk',-apple-system,BlinkMacSystemFont,sans-serif;
    color:var(--ink);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;
    background:
      repeating-linear-gradient(180deg, var(--grass) 0 64px, var(--grass-d) 64px 128px);
    position:relative;
  }
  /* stadium vignette + soft top light */
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background:
      radial-gradient(120% 80% at 50% -10%, rgba(255,255,255,.14), transparent 55%),
      radial-gradient(100% 100% at 50% 110%, rgba(0,0,0,.42), transparent 60%);}
  /* faint chalk pitch lines down the page edges */
  body::after{content:"";position:fixed;inset:18px;pointer-events:none;z-index:0;
    border:2px solid var(--line-faint);border-radius:4px;}
  .lang-toggle{position:fixed;top:16px;right:16px;z-index:200;font-family:'JetBrains Mono';font-size:12px;
    color:var(--gold);background:rgba(8,52,24,.7);backdrop-filter:blur(6px);border:1px solid var(--gold);
    border-radius:20px;padding:7px 15px;cursor:pointer;letter-spacing:.08em;transition:all .2s}
  .lang-toggle:hover{background:rgba(255,210,74,.18)}
  .wrap{max-width:1140px;margin:0 auto;padding:0 26px;position:relative;z-index:1}
  .mono{font-family:'JetBrains Mono',monospace}

  /* reveal animation base */
  .rv{opacity:0;transform:translateY(26px);transition:opacity .7s cubic-bezier(.2,.8,.2,1),transform .7s cubic-bezier(.2,.8,.2,1)}
  .rv.in{opacity:1;transform:none}
  .rv.d1{transition-delay:.08s}.rv.d2{transition-delay:.16s}.rv.d3{transition-delay:.24s}.rv.d4{transition-delay:.32s}
  @media(prefers-reduced-motion:reduce){.rv{opacity:1;transform:none;transition:none}}

  /* ===== HERO ===== */
  header.hero{padding:70px 0 26px;position:relative}
  /* center-circle motif behind hero */
  .hero-circle{position:absolute;top:-40px;right:-80px;width:420px;height:420px;border-radius:50%;
    border:2px solid var(--line-faint);z-index:0;pointer-events:none}
  .hero-circle::after{content:"";position:absolute;inset:160px;border-radius:50%;border:2px solid var(--line-faint)}
  .kicker{font-family:'JetBrains Mono',monospace;letter-spacing:.4em;font-size:11px;
    color:var(--gold);text-transform:uppercase;margin-bottom:18px;
    display:inline-flex;align-items:center;gap:10px}
  .kicker::before{content:"";width:26px;height:1px;background:var(--gold)}
  h1.big{font-family:'Bebas Neue',sans-serif;font-size:clamp(66px,16vw,186px);line-height:.8;margin:0;position:relative}
  h1.big span{display:block}
  h1.big .l1{color:#fff;text-shadow:0 2px 0 rgba(0,0,0,.18)}
  h1.big .l2{color:var(--gold);text-shadow:0 0 44px rgba(255,210,74,.4),0 2px 0 rgba(0,0,0,.2)}
  .lede{margin-top:24px;color:var(--chalk);font-size:15.5px;max-width:600px;line-height:1.72;text-shadow:0 1px 2px rgba(0,0,0,.2)}
  .lede b{color:#fff;font-weight:600}
  .hero-stats{display:flex;margin-top:32px;border-radius:14px;overflow:hidden;max-width:680px;
    background:var(--panel);backdrop-filter:blur(6px);border:1px solid var(--line-faint);box-shadow:var(--shadow)}
  .hs{flex:1;padding:18px 20px;border-right:1px solid var(--line-faint)}
  .hs:last-child{border-right:none}
  .hs .v{font-family:'Bebas Neue';font-size:40px;line-height:1;color:var(--gold)}
  .hs .v small{font-size:18px;color:var(--muted)}
  .hs .k{font-family:'JetBrains Mono';font-size:10px;color:var(--muted2);letter-spacing:.1em;text-transform:uppercase;margin-top:4px}
  .refresh{margin:24px 0 0;border:1px dashed var(--line-soft);border-radius:12px;padding:15px 20px;
    background:rgba(255,255,255,.06);font-size:13px;color:var(--chalk);line-height:1.6;max-width:680px;backdrop-filter:blur(4px)}
  .refresh b{color:var(--gold)}
  .refresh .stamp{font-family:'JetBrains Mono';font-size:10.5px;color:var(--gold);margin-top:6px;display:block}

  /* ===== SECTION ===== */
  /* ===== TOURNAMENT FUNNEL ===== */
  .funnel{display:flex;flex-direction:column;align-items:center;gap:9px;padding:20px 10px}
  .fstage{position:relative;border-radius:10px;padding:14px 20px;cursor:pointer;transition:transform .25s,box-shadow .25s;
    display:flex;align-items:center;justify-content:space-between;gap:16px;
    border:1px solid var(--line-faint);min-height:58px}
  .fstage:hover{transform:scale(1.015)}
  .fstage .fs-left{display:flex;align-items:center;gap:14px;min-width:0}
  .fstage .fs-name{font-family:'Bebas Neue';font-size:24px;letter-spacing:.03em;line-height:.9;white-space:nowrap}
  .fstage .fs-teams{font-family:'JetBrains Mono';font-size:11px;color:var(--muted2);white-space:nowrap}
  .fstage .fs-status{font-family:'JetBrains Mono';font-size:10px;padding:4px 11px;border-radius:20px;
    display:flex;align-items:center;gap:6px;white-space:nowrap;flex:none}
  .fstage .fs-status .d{width:7px;height:7px;border-radius:50%}
  /* states */
  .fstage.active{background:linear-gradient(135deg,rgba(255,210,74,.16),rgba(255,210,74,.04));border-color:var(--gold);box-shadow:0 0 26px rgba(255,210,74,.12)}
  .fstage.active .fs-name{color:var(--gold)}
  .fstage.active .fs-status{background:rgba(255,107,107,.18);color:#ff9b9b}
  .fstage.active .fs-status .d{background:#ff6b6b;animation:pulse 1.2s infinite}
  .fstage.upcoming{background:var(--panel)}
  .fstage.upcoming .fs-name{color:var(--muted)}
  .fstage.upcoming .fs-status{background:rgba(255,255,255,.07);color:var(--muted2)}
  .fstage.upcoming .fs-status .d{background:var(--muted2)}
  .fstage.locked{background:rgba(8,52,24,.35);opacity:.62}
  .fstage.locked .fs-name{color:var(--faint)}
  .fstage.locked .fs-status{background:rgba(0,0,0,.2);color:var(--faint)}
  .fstage.locked .fs-status .d{background:var(--faint)}
  .fstage .fs-arrow{position:absolute;left:50%;bottom:-14px;transform:translateX(-50%);color:var(--line2);font-size:12px;z-index:1}
  /* funnel widths (decreasing) */
  .fw1{width:100%}.fw2{width:84%}.fw3{width:70%}.fw4{width:56%}.fw5{width:42%}.fw6{width:30%}
  .fstage.fw6{justify-content:center}
  .fstage.fw6 .fs-left{flex-direction:column;gap:3px;align-items:center}
  @media(max-width:680px){
    .fw1,.fw2,.fw3,.fw4,.fw5,.fw6{width:100%}
    .fstage{padding:12px 16px}.fstage .fs-name{font-size:20px}
    .fstage .fs-teams{display:none}
  }

  section{padding:54px 0 6px;position:relative}
  .sh{display:flex;align-items:flex-end;gap:14px;margin-bottom:8px}
  .sh .num{font-family:'Bebas Neue';font-size:36px;color:var(--line-faint);line-height:.78;
    -webkit-text-stroke:1px var(--line-soft)}
  .sh h2{font-family:'Bebas Neue';font-size:clamp(30px,5vw,46px);letter-spacing:.02em;line-height:.88;
    text-shadow:0 2px 4px rgba(0,0,0,.22)}
  .sd{color:var(--muted);font-size:14px;margin:8px 0 26px;max-width:700px;line-height:1.66}
  .sd b{color:#fff}

  /* panel base (frosted on grass) */
  .glass{background:var(--panel);backdrop-filter:blur(7px);border:1px solid var(--line-faint);
    border-radius:16px;box-shadow:var(--shadow)}

  /* ===== BACKTEST ===== */
  .bt-hero{display:grid;grid-template-columns:200px 1fr;gap:26px;align-items:center;padding:26px}
  .bt-ring{position:relative;width:184px;height:184px;margin:0 auto}
  .bt-ring svg{transform:rotate(-90deg)}
  .bt-ring .lab{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .bt-ring .pct{font-family:'Bebas Neue';font-size:58px;color:var(--gold);line-height:.78}
  .bt-ring .sub{font-family:'JetBrains Mono';font-size:10px;color:var(--muted2);letter-spacing:.08em;margin-top:6px}
  .bt-side .row{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--line-faint)}
  .bt-side .row:last-child{border-bottom:none}
  .bt-side .yr{font-weight:600;font-size:15px}.bt-side .yr small{color:var(--muted2);font-weight:400;font-size:12px;margin-left:8px}
  .bt-side .sc{font-family:'JetBrains Mono';color:var(--gold);font-size:14px}
  .bt-note{margin-top:14px;font-size:12.5px;color:var(--muted);line-height:1.55}.bt-note b{color:var(--gold)}
  .bt-dots{display:grid;grid-template-columns:repeat(15,1fr);gap:5px;margin-top:16px}
  .bt-dots .dot{aspect-ratio:1;border-radius:4px;background:rgba(255,255,255,.1);
    opacity:0;transform:scale(.3);transition:opacity .35s,transform .35s,background .35s}
  .bt-dots .dot.show{opacity:1;transform:scale(1)}
  .bt-dots .dot.hit{background:var(--gold)}
  .bt-dots .dot.miss{background:rgba(255,120,90,.7)}
  details.misses{margin-top:12px}
  details.misses summary{cursor:pointer;font-family:'JetBrains Mono';font-size:12px;color:var(--gold);list-style:none}
  details.misses summary::-webkit-details-marker{display:none}
  details.misses summary::before{content:"вЦЄ "}details.misses[open] summary::before{content:"вЦЊ "}
  .miss-list{margin-top:10px;display:flex;flex-direction:column;gap:6px}
  .miss-list .m{font-size:12.5px;color:var(--muted)}.miss-list .m b{color:#fff}

  /* ===== DIVERGENCE ===== */
  .diverge{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:14px}
  .dv{padding:20px;position:relative;border-radius:14px;overflow:hidden;transition:transform .3s}
  .dv:hover{transform:translateY(-4px)}
  .dv .tag{display:inline-block;font-family:'JetBrains Mono';font-size:9.5px;letter-spacing:.08em;
    text-transform:uppercase;padding:3px 9px;border-radius:20px;margin-bottom:12px}
  .dv.up .tag{background:rgba(255,210,74,.18);color:var(--gold)}
  .dv.down .tag{background:rgba(255,120,90,.2);color:#ffb09a}
  .dv .t{font-family:'Bebas Neue';font-size:32px;letter-spacing:.02em;line-height:.88}
  .dv .body{font-size:12.5px;color:var(--muted);margin-top:10px;line-height:1.55}
  .dv .cmp{display:flex;gap:20px;margin-top:14px;padding-top:12px;border-top:1px solid var(--line-faint)}
  .dv .cmp .n{font-family:'JetBrains Mono';color:#fff;font-size:16px;font-weight:600}
  .dv .cmp small{font-family:'JetBrains Mono';color:var(--muted2);display:block;text-transform:uppercase;letter-spacing:.06em;margin-top:2px;font-size:10px}

  /* ===== BARS ===== */
  .bars{display:flex;flex-direction:column;gap:8px}
  .bar{display:grid;grid-template-columns:118px 1fr 48px;align-items:center;gap:13px}
  .bar .nm{font-size:13.5px;font-weight:600;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bar .track{height:22px;background:rgba(0,0,0,.22);border-radius:5px;overflow:hidden;border:1px solid var(--line-faint)}
  .bar .fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#bfe9c8,#5fd17e);width:0;transition:width 1.1s cubic-bezier(.2,.85,.25,1)}
  .bar:nth-child(-n+3) .fill{background:linear-gradient(90deg,var(--gold-d),var(--gold))}
  .bar .pct{font-family:'JetBrains Mono';font-size:12.5px;color:var(--gold);font-weight:600}

  /* ===== GROUP CARDS ===== */
  .groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:16px}
  .gcard{border-radius:16px;overflow:hidden}
  .gcard .ghd{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--line-faint);background:rgba(255,255,255,.04)}
  .gcard .gbadge{font-family:'Bebas Neue';font-size:24px;color:#0f5e29;background:var(--gold);
    width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;line-height:1}
  .gcard .glabel{font-family:'JetBrains Mono';font-size:10px;color:var(--muted2);letter-spacing:.12em;text-transform:uppercase}
  .gcard .gbody{display:grid;grid-template-columns:1fr 1fr}
  .gcol{padding:12px 0}
  .gcol.standings{border-right:1px solid var(--line-faint)}
  .gcol-h{font-family:'JetBrains Mono';font-size:9px;color:var(--muted2);letter-spacing:.1em;text-transform:uppercase;padding:0 14px 8px}
  .grow{display:grid;grid-template-columns:16px 1fr auto;align-items:center;gap:7px;padding:6px 14px;font-size:12.5px}
  .grow .gp{font-family:'JetBrains Mono';font-size:10px;color:var(--muted2);text-align:center}
  .grow .gtm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .grow .gpt{font-family:'JetBrains Mono';font-size:10px;color:var(--gold)}
  .grow.r1{background:rgba(255,210,74,.08)}.grow.r1 .gtm{color:var(--gold);font-weight:600}
  .grow.r2 .gtm{color:#fff}
  .grow.rx{opacity:.5}
  .gmatch{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;padding:5px 12px;font-size:10.5px;border-radius:6px;transition:background .2s}
  .gmatch:hover{background:rgba(255,255,255,.05)}
  .gmatch .ta{display:flex;justify-content:flex-end;align-items:center}
  .gmatch .tb{display:flex;justify-content:flex-start;align-items:center}
  .gmatch .sc{font-family:'JetBrains Mono';font-size:11px;color:#fff;background:rgba(0,0,0,.3);
    border-radius:5px;padding:2px 8px;font-weight:600;white-space:nowrap}

  /* ===== BRACKET ===== */
  .bracket-scroll{overflow-x:auto;border-radius:16px;padding:6px}
  svg.bracket{min-width:900px;width:100%;height:auto;display:block;padding:14px}
  .bx{fill:rgba(8,52,24,.55);stroke:var(--line-faint);stroke-width:1}
  .bx.win{fill:rgba(255,210,74,.12);stroke:var(--gold);stroke-width:1.5}
  .btxt{fill:var(--muted);font-size:12.5px;font-family:'Space Grotesk';font-weight:500}
  .btxt.win{fill:var(--gold);font-weight:600}
  .bline{stroke:var(--line-soft);stroke-width:1.3;fill:none;stroke-dasharray:240;stroke-dashoffset:240;transition:stroke-dashoffset 1.2s ease}
  .bline.draw{stroke-dashoffset:0}
  .blabel{fill:var(--muted2);font-size:9.5px;font-family:'JetBrains Mono';letter-spacing:.14em;text-transform:uppercase}
  .champtxt{fill:var(--gold);font-family:'Bebas Neue';font-size:28px;letter-spacing:.03em}

  /* ===== BLIND ===== */
  .bt-bar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;margin-bottom:18px}
  .scoreboard{display:flex;gap:1px;border-radius:12px;overflow:hidden;border:1px solid var(--line-faint)}
  .scoreboard .s{background:var(--panel);backdrop-filter:blur(6px);padding:14px 22px;text-align:center}
  .scoreboard .s b{font-family:'Bebas Neue';font-size:36px;display:block;line-height:.78;color:var(--gold)}
  .scoreboard .s span{font-family:'JetBrains Mono';font-size:9px;color:var(--muted2);letter-spacing:.08em;text-transform:uppercase}
  table.bt{width:100%;border-collapse:collapse;font-size:13px}
  table.bt thead th{font-family:'JetBrains Mono';font-size:9.5px;color:var(--muted2);text-transform:uppercase;letter-spacing:.1em;text-align:left;padding:9px 12px;border-bottom:1px solid var(--line-faint)}
  table.bt td{padding:10px 12px;border-bottom:1px solid var(--line-faint)}
  table.bt tr.done{background:rgba(255,210,74,.05)}
  .mt{font-weight:600;white-space:nowrap}.mt .v{color:var(--muted2);font-weight:400;margin:0 5px}
  .prob{font-family:'JetBrains Mono';font-size:11px;color:var(--muted2)}
  .pred{font-family:'JetBrains Mono';font-size:12px;color:var(--chalk)}
  .real{font-family:'JetBrains Mono';font-size:12px;color:#fff}
  .bd{font-family:'JetBrains Mono';font-size:9px;padding:2px 7px;border-radius:4px;white-space:nowrap;margin-left:6px}
  .bd.pending{background:rgba(255,255,255,.08);color:var(--muted2)}
  .bd.hit{background:rgba(120,230,150,.22);color:#b6f5c8}
  .bd.miss{background:rgba(255,120,90,.22);color:#ffb09a}
  .bd.bold{background:rgba(255,210,74,.15);color:var(--gold);border:1px solid rgba(255,210,74,.45)}

  /* ===== MODAL ===== */
  .modal-ov{position:fixed;inset:0;z-index:100;background:rgba(4,20,10,.78);backdrop-filter:blur(5px);
    display:none;align-items:center;justify-content:center;padding:20px;opacity:0;transition:opacity .25s}
  .modal-ov.open{display:flex;opacity:1}
  .modal-box{max-width:440px;width:100%;max-height:86vh;overflow-y:auto;padding:24px;border-radius:18px;
    transform:translateY(16px) scale(.98);transition:transform .3s cubic-bezier(.2,.85,.25,1)}
  .modal-ov.open .modal-box{transform:none}
  .modal-x{position:absolute;top:16px;right:18px;font-size:22px;color:var(--muted);cursor:pointer;line-height:1;background:none;border:none}
  .modal-x:hover{color:#fff}
  .m-title{font-family:'Bebas Neue';font-size:26px;letter-spacing:.02em;margin-bottom:4px;padding-right:30px}
  .m-sub{font-family:'JetBrains Mono';font-size:10px;color:var(--muted2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:18px}
  .m-match{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px;border-radius:12px;
    background:rgba(0,0,0,.22);margin-bottom:10px}
  .m-side{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;flex:1}
  .m-side.b{flex-direction:row-reverse;text-align:right}
  .m-sc{font-family:'Bebas Neue';font-size:30px;color:var(--gold);letter-spacing:.05em;white-space:nowrap}
  .m-bars{margin:14px 0}
  .m-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:11px}
  .m-bar-row .lab{width:54px;color:var(--muted2);font-family:'JetBrains Mono';font-size:10px}
  .m-bar-track{flex:1;height:14px;background:rgba(0,0,0,.25);border-radius:4px;overflow:hidden}
  .m-bar-fill{height:100%;border-radius:4px}
  .m-bar-row .pv{width:34px;text-align:right;font-family:'JetBrains Mono';color:#fff;font-size:11px}
  .m-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
  .m-stat{background:rgba(0,0,0,.2);border-radius:10px;padding:12px;text-align:center}
  .m-stat .v{font-family:'Bebas Neue';font-size:24px;color:var(--gold);line-height:.9}
  .m-stat .k{font-family:'JetBrains Mono';font-size:9px;color:var(--muted2);letter-spacing:.06em;text-transform:uppercase;margin-top:4px}
  .m-note{margin-top:14px;font-size:12px;color:var(--muted);line-height:1.55;padding-top:12px;border-top:1px solid var(--line-faint)}

  /* ===== MATCH CARDS (section 06) ===== */
  .refresh-btn{font-family:'JetBrains Mono';font-size:12px;color:var(--gold);background:rgba(255,210,74,.08);
    border:1px solid var(--gold);border-radius:9px;padding:9px 16px;cursor:pointer;transition:all .2s;letter-spacing:.04em}
  .refresh-btn:hover{background:rgba(255,210,74,.18)}
  .refresh-btn:disabled{opacity:.5;cursor:wait}
  .refresh-btn.spin{animation:btnspin 1s linear infinite}
  @keyframes btnspin{to{transform:none}}
  .match-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px}
  .mcard{border-radius:14px;padding:16px;position:relative;transition:transform .3s;display:flex;flex-direction:column;gap:12px}
  .mcard:hover{transform:translateY(-3px)}
  .mcard.live{border:1px solid rgba(255,107,107,.5)}
  .mcard.done{border:1px solid rgba(255,210,74,.35)}
  .mcard .mc-status{position:absolute;top:14px;right:14px;font-family:'JetBrains Mono';font-size:9px;
    letter-spacing:.06em;padding:3px 8px;border-radius:20px;display:flex;align-items:center;gap:5px}

qfL.forEach((m,i)=>{const y=i===0?tie1y:tie2y;const wa=win(m[0],m[1]);
  s+=box(xQFL,y,m[0],wa===m[0])+box(xQFL,y+40,m[1],wa===m[1]);});
// RIGHT QF
qfR.forEach((m,i)=>{const y=i===0?tie1y:tie2y;const wa=win(m[0],m[1]);
  s+=box(xQFR,y,m[0],wa===m[0])+box(xQFR,y+40,m[1],wa===m[1]);});
// SF
const sfL1=win(qfL[0][0],qfL[0][1]),sfL2=win(qfL[1][0],qfL[1][1]),sfWL=win(sfL1,sfL2);

s+=`<text class="blabel" x="${xSFL}" y="${sfY[0]-12}">${L_SF}</text>`;

s+=box(xSFR,sfY[0],sfR1,sfWR===sfR1)+box(xSFR,sfY[1],sfR2,sfWR===sfR2);

  // left tie1 (boxes at tie1y, tie1y+40) right edge -> sfL[0]
  conn(xQFL+BW, tie1y+BH/2, xSFL, sfY[0]+BH/2)+

  conn(xQFL+BW, tie2y+40+BH/2, xSFL, sfY[1]+BH/2)+
  // right tie1 left edge -> sfR[0]
  conn(xQFR, tie1y+BH/2, xSFR+BW, sfY[0]+BH/2)+
  conn(xQFR, tie1y+40+BH/2, xSFR+BW, sfY[0]+BH/2)+
  // right tie2 -> sfR[1]
  conn(xQFR, tie2y+BH/2, xSFR+BW, sfY[1]+BH/2)+
  conn(xQFR, tie2y+40+BH/2, xSFR+BW, sfY[1]+BH/2)+
  // SF-L boxes -> final[0]; SF winner path into final
  conn(xSFL+BW, sfY[0]+BH/2, xFIN, finY[0]+BH/2)+
  conn(xSFL+BW, sfY[1]+BH/2, xFIN, finY[0]+BH/2)+
  // SF-R boxes -> final[1]
  conn(xSFR, sfY[0]+BH/2, xFIN+BW, finY[1]+BH/2)+
  conn(xSFR, sfY[1]+BH/2, xFIN+BW, finY[1]+BH/2);
svg.innerHTML=s+lines;

}

// outcome from a score string "x-y" -> winner team name or "Draw"
function scoreWinner(m,scoreStr){
 const p=(scoreStr||'').split('-');if(p.length!==2)return null;
 const x=+p[0],y=+p[1];if(isNaN(x)||isNaN(y))return null;
 return x>y?m.a:(x<y?m.b:"Draw");
}
let done=0,wdlHit=0,exactHit=0,live=0;
function mcard(m){
 const el=document.createElement('div');el.className='mcard glass rv';el.style.cursor='pointer';
 el.onclick=()=>openModal(m);
 let status='',scores='';
 if(m.live){ live++; el.classList.add('live');

 } else if(m.real){ done++;

   const exactOk = m.real.score===m.score;      // еЕЈдљУжѓФеИЖ
   if(wdlOk)wdlHit++; if(exactOk)exactHit++;
   el.classList.add('done');
   let badge;
   if(exactOk) badge=`<div class="mc-status done exact">${t('exact')}</div>`;
   else if(wdlOk) badge=`<div class="mc-status done hit">${t('hit')}</div>`;
   else badge=`<div class="mc-status done miss">${t('miss')}</div>`;
   status=badge;
   scores=`<div class="mc-scores">
     <div class="mc-scorebox pred"><div class="lbl">${t('predicted')}</div><div class="val">${m.score}</div></div>
     <div class="mc-scorebox real"><div class="lbl">${t('realScore')}</div><div class="val">${m.real.score}</div></div></div>`;
 } else {
   status=`<div class="mc-status pending">${t('pending')}</div>`;
   scores=`<div class="mc-scores">
     <div class="mc-scorebox pred"><div class="lbl">йҐДжµЛжѓФеИЖ</div><div class="val">${m.score}</div></div>
     <div class="mc-scorebox"><div class="lbl">${t('predWinner')}</div><div class="val" style="font-size:14px;font-family:'Space Grotesk';padding-top:6px">${predLabel(m)}</div></div></div>`;
 }
 el.innerHTML=`${status}
   <div class="mc-teams"><span class="mc-team a">${flag(m.a,17)} ${TN(m.a)}</span><span class="mc-vs">vs</span><span class="mc-team b">${flag(m.b,17)} ${TN(m.b)}</span></div>
   ${m.bold?`<div style="margin-top:-4px;text-align:center"><span class="mc-bold">${t('marketGap')}</span></div>`:''}
   ${scores}
   <div class="mc-meta"><span>xG <span class="mm-v">${m.xa} вАУ ${m.xb}</span></span><span>${t('clickDetail')}</span></div>`;
 cardsBox.appendChild(el);io.observe(el);
}
function renderAllMatches(){

}

function applyStatic(){

function setLang(l){
  LANG=l;
  document.documentElement.lang = (l==='zh'?'zh':'en');
  document.getElementById('langToggle').textContent = (l==='zh'?'EN':'дЄ≠');
  applyStatic();
  // re-render all dynamic pieces
  renderFunnel(); renderDV(); renderGroups(); renderBracket(); renderAllMatches();

}

/* ---------- duel ---------- */
const fact=n=>{let r=1;for(let i=2;i<=n;i++)r*=i;return r;};
const pois=(m,k)=>Math.exp(-m)*Math.pow(m,k)/fact(k);
const eg=(a,b)=>[1.45*Math.exp((a-b)/26),1.45*Math.exp((b-a)/26)];
function calc(a,b){const[ma,mb]=eg(R[a],R[b]);let pa=0,pd=0,pb=0,bb=0,bs=[0,0];
 for(let g=0;g<8;g++)for(let h=0;h<8;h++){const p=pois(ma,g)*pois(mb,h);if(g>h)pa+=p;else if(g===h)pd+=p;else pb+=p;if(p>bb){bb=p;bs=[g,h];}}return{pa,pd,pb,bs};}
const sa=document.getElementById('selA'),sb=document.getElementById('selB');
Object.keys(R).sort((x,y)=>R[y]-R[x]).forEach(t=>{sa.add(new Option(TN(t),t));sb.add(new Option(TN(t),t));});
sa.value="Brazil";sb.value="Morocco";
const pa=document.getElementById('pa'),pd=document.getElementById('pd'),pb=document.getElementById('pb'),sl=document.getElementById('sl');
function render(){const a=sa.value,b=sb.value;if(a===b)return;const r=calc(a,b);
 pa.style.width=(r.pa*100)+'%';pd.style.width=(r.pd*100)+'%';pb.style.width=(r.pb*100)+'%';
 pa.textContent=Math.round(r.pa*100)+'%';pd.textContent=Math.round(r.pd*100)+'%';pb.textContent=Math.round(r.pb*100)+'%';
 sl.innerHTML=`${flag(a,20)}<b>${r.bs[0]}вАУ${r.bs[1]}</b>${flag(b,20)}`;}
